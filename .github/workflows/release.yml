name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Sync .command from .sh
        run: cp scripts/setup-mac.sh scripts/setup-mac.command

      - name: Bundle Windows files into a single zip
        run: |
          mkdir -p dist/compendium-windows
          cp scripts/setup-windows.bat scripts/setup-windows.ps1 dist/compendium-windows/
          cd dist && zip -r compendium-windows.zip compendium-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Compendium Sync ${{ github.ref_name }}"
          body: |
            ## Setup Instructions

            ### 🪟 Windows
            1. Download **`compendium-windows.zip`** below
            2. Right-click the zip → **Extract All…**
            3. Open the extracted folder and double-click **`setup-windows.bat`**

            ### 🍎 Mac
            Open **Terminal** (press `Cmd+Space`, type `Terminal`, press Enter) and paste this:
            ```
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/setup-mac.sh | bash
            ```

            ### 🐧 Linux
            Open a terminal and run:
            ```
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/setup-linux.sh | bash
            ```

            ---
            Syncthing installs and configures automatically.
            Your vault appears at `Documents/The-Compendium` once the initial sync completes (~5 min).
          files: |
            dist/compendium-windows.zip
            scripts/setup-linux.sh
          fail_on_unmatched_files: true
