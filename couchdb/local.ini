; CouchDB config overrides for Obsidian Self-hosted LiveSync.
; See https://github.com/vrtmrz/obsidian-livesync/blob/main/docs/setup_own_server.md

[couchdb]
single_node = true
max_document_size = 50000000

[chttpd]
require_valid_user = true
; Keep /_up reachable without auth so health checks (Railway + our installer) work.
require_valid_user_except_for_up = true
max_http_request_size = 4294967296
bind_address = 0.0.0.0
enable_cors = true

[chttpd_auth]
require_valid_user = true
authentication_redirect = /_utils/session.html

[httpd]
WWW-Authenticate = Basic realm="couchdb"
enable_cors = true

; Obsidian desktop runs as app://obsidian.md, mobile app as capacitor://localhost
[cors]
origins = app://obsidian.md,capacitor://localhost,http://localhost
credentials = true
headers = accept, authorization, content-type, origin, referer, x-csrf-token, x-requested-with
methods = GET, PUT, POST, HEAD, DELETE
max_age = 3600
